name: Build EdenReligion

on:
  push:
    branches: [ "main" ]
    paths:
      - "EdenReligion/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "EdenReligion/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: EdenReligion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3

      - name: Build with Gradle
        run: gradle build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdenReligion-jar
          path: EdenReligion/build/libs/*.jar
          if-no-files-found: error
